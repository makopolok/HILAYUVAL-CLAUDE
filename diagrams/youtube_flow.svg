<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="800" viewBox="0 0 1100 800">
  <style>
    .box { fill: #fff; stroke: #c53030; stroke-width: 2; rx:8; }
    .small { font: 12px sans-serif; fill: #2d3748 }
    .title { font: 14px sans-serif; font-weight: 600; fill: #822727 }
    .arrow { stroke: #2d3748; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>

  <!-- Swimlane labels -->
  <text x="40" y="40" class="title">User (Browser)</text>
  <text x="40" y="140" class="title">Frontend (JS)</text>
  <text x="40" y="260" class="title">Server / Background Job</text>
  <text x="40" y="420" class="title">YouTube (API)</text>

  <!-- Boxes -->
  <rect x="40" y="60" width="260" height="60" class="box" />
  <text x="60" y="95" class="small">1. Click "Upload to YouTube"</text>
  <text x="60" y="112" class="small">Collect file &amp; metadata</text>

  <rect x="40" y="160" width="420" height="80" class="box" />
  <text x="60" y="195" class="small">2. Request upload intent or start background upload</text>
  <text x="60" y="212" class="small">Option: send file to server or server retrieves from Bunny</text>

  <rect x="40" y="280" width="700" height="120" class="box" />
  <text x="60" y="315" class="small">3. Server or background worker prepares YouTube upload</text>
  <text x="60" y="332" class="small">- Acquire OAuth token (service account or user token)</text>
  <text x="60" y="349" class="small">- If source is Bunny: fetch file or provide resumable upload link</text>
  <text x="60" y="366" class="small">4. Start YouTube resumable upload (Upload URL)</text>

  <rect x="40" y="460" width="420" height="80" class="box" />
  <text x="60" y="495" class="small">5. Upload video to YouTube via API</text>
  <text x="60" y="512" class="small">Resumable session; progress, retries, handle rate limits</text>

  <rect x="520" y="460" width="420" height="80" class="box" />
  <text x="540" y="495" class="small">6. YouTube processes video (encoding, thumbnails)</text>
  <text x="540" y="512" class="small">YouTube returns videoId and metadata on success</text>

  <rect x="40" y="560" width="820" height="100" class="box" />
  <text x="60" y="595" class="small">7. Server receives upload completion &amp; metadata</text>
  <text x="60" y="612" class="small">8. Persist audition record with youtube videoId, playlist updates</text>
  <text x="60" y="629" class="small">9. Notify frontend/user; invalidate caches</text>

  <rect x="40" y="680" width="820" height="60" class="box" />
  <text x="60" y="715" class="small">10. Optionally mirror to Bunny or add to project playlists</text>

  <!-- Arrows -->
  <line x1="200" y1="120" x2="200" y2="160" class="arrow" />
  <line x1="260" y1="240" x2="200" y2="280" class="arrow" />
  <line x1="300" y1="400" x2="300" y2="460" class="arrow" />
  <line x1="420" y1="500" x2="520" y2="500" class="arrow" />
  <line x1="520" y1="540" x2="520" y2="560" class="arrow" />
  <line x1="460" y1="670" x2="160" y2="670" class="arrow" />

  <!-- Failure notes -->
  <rect x="880" y="120" width="200" height="140" rx="6" fill="#fff8f0" stroke="#dd6b20" stroke-width="2" />
  <text x="900" y="150" class="small">Common Failures</text>
  <text x="900" y="168" class="small">• OAuth token expired / 401</text>
  <text x="900" y="186" class="small">• Upload interrupted / rate limited</text>
  <text x="900" y="204" class="small">• DB insert fails after YouTube success</text>
  <text x="900" y="222" class="small">• Quota exceeded / API errors</text>

</svg>